name: Auto Merge PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-merge:
    # Disabled: PRs now stay open during the day, evening workflow merges to main
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Mark PR as ready (undraft)
        run:
          gh pr ready ${{ github.event.pull_request.number }} --repo ${{
          github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve PR
        run:
          gh pr review ${{ github.event.pull_request.number }} --approve --repo
          ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Merge PR
        id: merge
        run:
          gh pr merge ${{ github.event.pull_request.number }} --rebase --repo ${{
          github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger site deploy
        if: steps.merge.outcome == 'success'
        continue-on-error: true
        run: |
          gh workflow run deploy.yml --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # jules-chain dispatch removed — daily cycle replaces sequential chaining
