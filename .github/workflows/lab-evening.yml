name: Lab Evening — Reconcile Branches

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # ── Step 1: Find and merge open persona PRs targeting main ──────
      - name: Merge persona PRs
        id: merge-prs
        run: |
          PERSONAS="baldo scott sabine pearl fuchs liang wolfram mycroft giles"
          CONFLICTED=""

          # Get all open PRs targeting main
          PRS=$(gh pr list --base main --state open --json number,headRefName,title --limit 50)

          for persona in $PERSONAS; do
            # Find this persona's PR by title pattern "Rosencrantz"
            PR_NUM=$(echo "$PRS" | python3 -c "
          import json, sys
          prs = json.load(sys.stdin)
          for pr in prs:
              title = pr.get('title', '').lower()
              head = pr.get('headRefName', '')
              if '${persona}' in title or '_${persona}' in head or '_${persona}-' in head:
                  print(pr['number'])
                  break
          " 2>/dev/null || echo "")

            if [ -z "$PR_NUM" ]; then
              echo "${persona}: no open PR"
              continue
            fi

            # Wait for GitHub to compute merge status
            sleep 3

            MERGEABLE=$(gh pr view "$PR_NUM" --json mergeable --jq '.mergeable' 2>/dev/null || echo "UNKNOWN")

            if [ "$MERGEABLE" = "MERGEABLE" ]; then
              echo "Merging #${PR_NUM} (${persona})..."
              gh pr merge "$PR_NUM" --merge --admin || echo "Failed to merge #${PR_NUM}"
              sleep 3
            else
              echo "${persona}: PR #${PR_NUM} has conflicts — labeling"
              gh pr edit "$PR_NUM" --add-label "needs-conflict-resolution" 2>/dev/null || true
              CONFLICTED="${CONFLICTED} ${persona}"
            fi
          done

          echo "conflicted=${CONFLICTED}" >> "$GITHUB_OUTPUT"

      # ── Step 2: Ask personas to fix conflicts ────────────────────────
      - name: Send conflict resolution messages
        if: steps.merge-prs.outputs.conflicted != ''
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import subprocess

          import requests

          API = "https://jules.googleapis.com/v1alpha"
          KEY = os.environ["JULES_API_KEY"]
          HEADERS = {"x-goog-api-key": KEY, "Content-Type": "application/json"}
          PERSONAS = ["baldo", "scott", "sabine", "pearl", "fuchs",
                      "liang", "wolfram", "mycroft", "giles"]

          # Load session map
          sessions = {}
          try:
              with open("lab/sessions.json") as f:
                  sessions = json.load(f)
          except Exception:
              pass

          # Find conflicted PRs
          result = subprocess.run(
              ["gh", "pr", "list", "--base", "main", "--state", "open",
               "--label", "needs-conflict-resolution",
               "--json", "number,headRefName,title"],
              capture_output=True, text=True,
          )
          try:
              prs = json.loads(result.stdout)
          except Exception:
              print("No conflicted PRs found.")
              exit(0)

          for pr in prs:
            pr_num = pr["number"]
            head = pr.get("headRefName", "")
            title = pr.get("title", "")

            # Match to persona
            persona = None
            for p in PERSONAS:
                if p in title.lower() or f"_{p}" in head or f"_{p}-" in head:
                    persona = p
                    break
            if not persona:
                continue

            session_id = sessions.get(persona, {}).get("session_id")
            if not session_id:
                print(f"  {persona}: no session, will handle next time")
                continue

            prompt = (
                f"Your PR #{pr_num} (branch {head}) has merge conflicts with main. "
                f"Please resolve:\n"
                f"  git fetch origin main\n"
                f"  git merge origin/main\n\n"
                f"Resolve conflicts, commit, and push."
            )

            resp = requests.post(
                f"{API}/sessions/{session_id}:sendMessage",
                headers=HEADERS,
                json={"prompt": prompt},
            )
            if resp.ok:
                print(f"  {persona}: sent conflict resolution (session {session_id[:12]}...)")
            else:
                print(f"  {persona}: failed: {resp.status_code}")
          PYEOF

      # ── Step 3: Wait, then merge remaining ──────────────────────────
      - name: Wait for conflict resolution
        if: steps.merge-prs.outputs.conflicted != ''
        run: sleep 300

      - name: Merge remaining PRs
        if: steps.merge-prs.outputs.conflicted != ''
        run: |
          PRS=$(gh pr list --base main --state open --label "needs-conflict-resolution" \
            --json number --jq '.[].number' 2>/dev/null || echo "")

          for PR_NUM in $PRS; do
            MERGEABLE=$(gh pr view "$PR_NUM" --json mergeable --jq '.mergeable' 2>/dev/null || echo "UNKNOWN")

            if [ "$MERGEABLE" = "MERGEABLE" ]; then
              echo "Merging #${PR_NUM}..."
              gh pr merge "$PR_NUM" --merge --admin || echo "Failed to merge #${PR_NUM}"
              gh pr edit "$PR_NUM" --remove-label "needs-conflict-resolution" 2>/dev/null || true
              sleep 3
            else
              echo "Still conflicted: #${PR_NUM} — will handle next evening"
            fi
          done

      # ── Step 4: Trigger site deploy ──────────────────────────────────
      - name: Trigger site deploy
        continue-on-error: true
        run: |
          gh workflow run deploy.yml --repo franklinbaldo/rosencrantz-coin 2>/dev/null || true
