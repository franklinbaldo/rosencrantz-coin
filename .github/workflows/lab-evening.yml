name: Lab Evening — Reconcile Branches

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # ── Step 1: Create PRs from persona branches to main ──────────────
      - name: Create PRs
        id: create-prs
        run: |
          DATE=$(date -u +%Y-%m-%d)
          PERSONAS="baldo scott sabine pearl fuchs liang wolfram mycroft giles"
          CONFLICTED=""

          for persona in $PERSONAS; do
            BRANCH="${DATE}_${persona}"

            # Check if branch exists on remote
            if ! git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
              echo "${persona}: no branch today, skipping"
              continue
            fi

            # Check for new commits vs main
            git fetch origin "$BRANCH" main --quiet
            AHEAD=$(git rev-list --count "origin/main..origin/${BRANCH}" 2>/dev/null || echo 0)

            if [ "$AHEAD" = "0" ]; then
              echo "${persona}: no new commits, skipping"
              continue
            fi

            echo "${persona}: ${AHEAD} commit(s) ahead of main"

            # Check if PR already exists
            EXISTING=$(gh pr list --head "$BRANCH" --base main \
              --json number --jq '.[0].number // empty' 2>/dev/null)

            if [ -n "$EXISTING" ]; then
              echo "  PR already exists: #${EXISTING}"
              PR_NUM="$EXISTING"
            else
              # Create the PR
              SUMMARY=$(git log --oneline "origin/main..origin/${BRANCH}" | head -10)
              PR_NUM=$(gh pr create \
                --base main --head "$BRANCH" \
                --title "[${persona}] ${DATE} session" \
                --body "$(cat <<PREOF
          ## ${persona}'s daily work

          ${SUMMARY}

          ---
          Auto-generated by Lab Evening.
          PREOF
              )" --json number --jq '.number' 2>/dev/null || echo "")

              if [ -z "$PR_NUM" ]; then
                echo "  ERROR: failed to create PR for ${persona}"
                continue
              fi
              echo "  Created PR #${PR_NUM}"
            fi

            # Wait for GitHub to compute merge status
            sleep 5

            # Check mergeability
            MERGEABLE=$(gh pr view "$PR_NUM" --json mergeable --jq '.mergeable' 2>/dev/null || echo "UNKNOWN")

            if [ "$MERGEABLE" = "MERGEABLE" ]; then
              echo "  Mergeable — will merge later"
            else
              echo "  CONFLICT detected — labeling for resolution"
              gh pr edit "$PR_NUM" --add-label "needs-conflict-resolution" 2>/dev/null || true
              CONFLICTED="${CONFLICTED} ${persona}"
            fi
          done

          echo "conflicted=${CONFLICTED}" >> "$GITHUB_OUTPUT"

      # ── Step 2: Ask personas to fix conflicts ────────────────────────
      - name: Send conflict resolution messages
        if: steps.create-prs.outputs.conflicted != ''
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import subprocess
          import time

          import requests

          API = "https://jules.googleapis.com/v1alpha"
          KEY = os.environ["JULES_API_KEY"]
          HEADERS = {"x-goog-api-key": KEY, "Content-Type": "application/json"}
          DATE = time.strftime("%Y-%m-%d", time.gmtime())
          PERSONAS = ["baldo", "scott", "sabine", "pearl", "fuchs",
                      "liang", "wolfram", "mycroft", "giles"]

          # Find which PRs have conflicts
          conflicted = []
          for persona in PERSONAS:
              branch = f"{DATE}_{persona}"
              result = subprocess.run(
                  ["gh", "pr", "list", "--head", branch,
                   "--label", "needs-conflict-resolution",
                   "--json", "number", "--jq", ".[0].number // empty"],
                  capture_output=True, text=True,
              )
              pr_num = result.stdout.strip()
              if pr_num:
                  conflicted.append((persona, branch, pr_num))

          if not conflicted:
              print("No conflicted PRs. All clean!")
              exit(0)

          print(f"Found {len(conflicted)} conflicted PR(s)")

          # Find today's active sessions
          resp = requests.get(f"{API}/sessions?pageSize=100", headers=HEADERS)
          sessions = resp.json().get("sessions", [])

          session_map = {}
          for s in sessions:
              ctx = s.get("sourceContext", {}).get("githubRepoContext", {})
              sb = ctx.get("startingBranch", "")
              if sb.startswith(DATE + "_"):
                  persona_name = sb[len(DATE) + 1:]
                  state = s.get("state", "")
                  if state not in ("COMPLETED", "FAILED"):
                      session_map[persona_name] = s["name"].split("/")[-1]

          # Send conflict resolution message to each conflicted persona
          for persona, branch, pr_num in conflicted:
              session_id = session_map.get(persona)
              if not session_id:
                  print(f"  {persona}: no active session, will handle next morning")
                  continue

              prompt = (
                  f"Your branch {branch} has merge conflicts with main. "
                  f"PR #{pr_num} is open and cannot be merged.\n\n"
                  f"Please resolve the conflicts:\n"
                  f"  git fetch origin main\n"
                  f"  git merge origin/main\n\n"
                  f"Resolve any conflicts (keep both sides where possible, "
                  f"prefer the more recent version for STATE.md). "
                  f"Commit the merge resolution and push."
              )

              resp = requests.post(
                  f"{API}/sessions/{session_id}:sendMessage",
                  headers=HEADERS,
                  json={"prompt": prompt},
              )
              if resp.ok:
                  print(f"  {persona}: sent conflict resolution message (session {session_id})")
              else:
                  print(f"  {persona}: failed to send message: {resp.status_code}")
          PYEOF

      # ── Step 3: Wait, then merge everything clean ────────────────────
      - name: Wait for conflict resolution
        if: steps.create-prs.outputs.conflicted != ''
        run: sleep 300

      - name: Merge all ready PRs
        run: |
          DATE=$(date -u +%Y-%m-%d)
          PERSONAS="baldo scott sabine pearl fuchs liang wolfram mycroft giles"

          for persona in $PERSONAS; do
            BRANCH="${DATE}_${persona}"

            PR_NUM=$(gh pr list --head "$BRANCH" --base main --state open \
              --json number --jq '.[0].number // empty' 2>/dev/null)

            if [ -z "$PR_NUM" ]; then
              continue
            fi

            MERGEABLE=$(gh pr view "$PR_NUM" --json mergeable --jq '.mergeable' 2>/dev/null || echo "UNKNOWN")

            if [ "$MERGEABLE" = "MERGEABLE" ]; then
              echo "Merging #${PR_NUM} (${persona})..."
              gh pr merge "$PR_NUM" --merge --admin || echo "Failed to merge #${PR_NUM}"
              gh pr edit "$PR_NUM" --remove-label "needs-conflict-resolution" 2>/dev/null || true
              sleep 3
            else
              echo "Still conflicted: #${PR_NUM} (${persona}) — will handle next morning"
            fi
          done

      # ── Step 4: Cleanup merged branches ──────────────────────────────
      - name: Delete merged branches
        run: |
          DATE=$(date -u +%Y-%m-%d)
          PERSONAS="baldo scott sabine pearl fuchs liang wolfram mycroft giles"

          for persona in $PERSONAS; do
            BRANCH="${DATE}_${persona}"

            MERGED=$(gh pr list --head "$BRANCH" --state merged \
              --json number --jq '.[0].number // empty' 2>/dev/null)

            if [ -n "$MERGED" ]; then
              gh api -X DELETE \
                "repos/franklinbaldo/rosencrantz-coin/git/refs/heads/${BRANCH}" 2>/dev/null || true
              echo "Deleted: ${BRANCH}"
            else
              echo "Kept (unmerged): ${BRANCH}"
            fi
          done

      # ── Step 5: Trigger site deploy ──────────────────────────────────
      - name: Trigger site deploy
        continue-on-error: true
        run: |
          gh workflow run deploy.yml --repo franklinbaldo/rosencrantz-coin 2>/dev/null || true
