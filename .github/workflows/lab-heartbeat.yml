name: Lab Heartbeat

on:
  schedule:
    - cron: '20 6 * * *'
    - cron: '40 6 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Sync session branches to daily branches
        run: python tools/heartbeat.py sync-branches
        continue-on-error: true

      - name: Send heartbeats
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          python tools/heartbeat.py status
          echo ""
          python tools/heartbeat.py heartbeat

      - name: Deliver mail
        run: python3 tools/lab-mail deliver

      - name: Commit heartbeat log and delivered mail
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lab/heartbeats/ lab/mail/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "heartbeat: round $(date -u +%Y-%m-%d) $(date -u +%H:%M) UTC + mail delivery"
            git push
          fi
