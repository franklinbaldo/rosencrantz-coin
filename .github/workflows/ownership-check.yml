name: Ownership Check

on:
  pull_request_target:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-ownership:
    if: github.event.pull_request.merged == false && github.event.pull_request.state == 'open'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Extract persona from PR title
        id: persona
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          # Extract persona name from PR title
          # Supports both "[persona] text" and "persona: text" formats
          PERSONA=$(echo "$TITLE" | grep -oP '^\[(\w+)\]' | tr -d '[]' | tr '[:upper:]' '[:lower:]')
          if [ -z "$PERSONA" ]; then
            PERSONA=$(echo "$TITLE" | grep -oP '^\w+(?=:)' | tr '[:upper:]' '[:lower:]')
          fi
          if [ -z "$PERSONA" ]; then
            echo "No persona found in PR title: $TITLE"
            echo "name=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "name=$PERSONA" >> "$GITHUB_OUTPUT"
          echo "Detected persona: $PERSONA"

      - name: Check file ownership
        if: steps.persona.outputs.name != ''
        run: |
          PERSONA="${{ steps.persona.outputs.name }}"
          echo "Checking that all changed files belong to persona: $PERSONA"

          # Infrastructure persona (evans) is authorized to touch any file
          # EXCEPT lab/heartbeats/ (managed exclusively by heartbeat CI on main)
          if [ "$PERSONA" = "evans" ] || [ "$PERSONA" = "fix" ]; then
            HB_VIOLATIONS=""
            while IFS= read -r file; do
              [ -z "$file" ] && continue

            # Ignore files that were deleted on main and are not present in HEAD
            if ! git show "origin/main:$file" &>/dev/null && ! git show "HEAD:$file" &>/dev/null; then
              continue
            fi
              if echo "$file" | grep -q "^lab/heartbeats/"; then
                HB_VIOLATIONS="$HB_VIOLATIONS\n  - $file"
              fi
            done < <(git log --no-merges --name-only --format="" origin/main..HEAD | awk NF | sort -u)
            if [ -n "$HB_VIOLATIONS" ]; then
              echo "::error::Evans may not modify lab/heartbeats/ (managed by CI on main):"
              echo -e "$HB_VIOLATIONS"
              exit 1
            fi
            echo "Infrastructure persona (evans) — all files allowed. OK."
            exit 0
          fi

          VIOLATIONS=""
          while IFS= read -r file; do
            # Skip empty lines
            [ -z "$file" ] && continue

            # Ignore files that were deleted on main and are not present in HEAD
            if ! git show "origin/main:$file" &>/dev/null && ! git show "HEAD:$file" &>/dev/null; then
              continue
            fi

            # Block all personas from touching lab/heartbeats/
            if echo "$file" | grep -q "^lab/heartbeats/"; then
              VIOLATIONS="$VIOLATIONS\n  - $file (heartbeat logs are managed by CI)"
              continue
            fi

            # Check if the file path contains the persona name
            if echo "$file" | grep -qi "$PERSONA"; then
              continue
            fi

            # Allow retracted/ moves (filename must contain persona prefix)
            if echo "$file" | grep -q "^retracted/${PERSONA}_"; then
              continue
            fi

            # Everything else is a violation
            VIOLATIONS="$VIOLATIONS\n  - $file"
          done < <(git log --no-merges --name-only --format="" origin/main..HEAD | awk NF | sort -u)

          if [ -n "$VIOLATIONS" ]; then
            echo "::error::OWNERSHIP VIOLATION: $PERSONA touched files outside their ownership:"
            echo -e "$VIOLATIONS"
            echo ""
            echo "Golden Rule: You may ONLY modify files under folders containing your persona name."
            echo "Violating files will cause merge conflicts and block your PR."
            exit 1
          else
            echo "All changed files belong to $PERSONA. OK."
          fi
