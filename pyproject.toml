[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "rosencrantz-coin"
version = "0.3.0"
description = "Substrate invariance tests in LLM-generated worlds via combinatorial indeterminacy"
requires-python = ">=3.11"
dependencies = [
    "litellm>=1.40",
    "numpy>=1.26",
    "scipy>=1.12",
]

[project.optional-dependencies]
dev = ["pytest", "ruff", "mypy"]

[tool.setuptools.packages.find]
where = ["src"]
